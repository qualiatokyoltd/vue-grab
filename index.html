<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vue-grab — Interactive Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f23;
      color: #e0e0e0;
      min-height: 100vh;
    }

    /* ── Hero ── */
    .hero {
      text-align: center;
      padding: 60px 20px 40px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      border-bottom: 2px solid #42b883;
    }
    .hero h1 {
      font-size: 3rem;
      font-weight: 800;
      margin-bottom: 12px;
    }
    .hero h1 span { color: #42b883; }
    .hero p {
      color: #8892b0;
      font-size: 1.1rem;
      max-width: 600px;
      margin: 0 auto 24px;
    }
    .hero .shortcut-badge {
      display: inline-block;
      background: rgba(66, 184, 131, 0.15);
      border: 1px solid rgba(66, 184, 131, 0.4);
      color: #42b883;
      padding: 8px 20px;
      border-radius: 20px;
      font-family: 'SF Mono', monospace;
      font-size: 0.9rem;
    }

    /* ── Button ── */
    .grab-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 32px;
      background: #42b883;
      color: #0f0f23;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .grab-btn:hover {
      background: #5cd09c;
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(66, 184, 131, 0.4);
    }

    /* ── Content ── */
    .content { padding: 40px 20px; max-width: 1000px; margin: 0 auto; }
    .section-title {
      font-size: 1.4rem;
      color: #42b883;
      margin-bottom: 20px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(66, 184, 131, 0.2);
    }

    /* ── Cards ── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 24px;
      transition: all 0.2s;
    }
    .card:hover {
      border-color: #42b883;
      box-shadow: 0 4px 20px rgba(66, 184, 131, 0.1);
    }
    .card h3 {
      color: #42b883;
      margin-bottom: 8px;
      font-size: 1.1rem;
    }
    .card p { color: #8892b0; line-height: 1.6; }

    /* ── Fake components ── */
    .user-profile {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 24px;
      display: flex;
      gap: 20px;
      align-items: center;
      margin-bottom: 20px;
    }
    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #42b883, #35495e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }
    .user-info h3 { margin-bottom: 4px; }
    .user-info p { color: #8892b0; font-size: 0.9rem; }

    .stats-row {
      display: flex;
      gap: 16px;
      margin-bottom: 40px;
    }
    .stat-card {
      flex: 1;
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    .stat-card .number {
      font-size: 2rem;
      font-weight: 800;
      color: #42b883;
    }
    .stat-card .label {
      color: #8892b0;
      font-size: 0.85rem;
      margin-top: 4px;
    }

    .action-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 40px;
    }
    .action-bar button {
      padding: 10px 20px;
      border-radius: 8px;
      border: 1px solid #2a2a4a;
      background: #1a1a2e;
      color: #e0e0e0;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.9rem;
    }
    .action-bar button:hover {
      border-color: #42b883;
      color: #42b883;
    }
    .action-bar button.primary {
      background: #42b883;
      color: #0f0f23;
      border-color: #42b883;
      font-weight: 600;
    }
    .action-bar button.primary:hover {
      background: #5cd09c;
    }

    /* ── Output ── */
    .output-section {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 40px;
    }
    .output-section h3 {
      color: #42b883;
      margin-bottom: 12px;
    }
    .output-section pre {
      background: #0f0f23;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 16px;
      color: #8892b0;
      font-size: 0.85rem;
      line-height: 1.6;
      overflow-x: auto;
      white-space: pre-wrap;
      min-height: 60px;
    }

    .footer {
      text-align: center;
      padding: 20px;
      color: #4a4a6a;
      font-size: 0.85rem;
    }
    .footer a { color: #42b883; text-decoration: none; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="importmap">
  {
    "imports": {
      "vue": "https://unpkg.com/vue@3/dist/vue.esm-browser.js"
    }
  }
  </script>

  <script type="module">
    import { createApp, ref, defineComponent, h } from 'vue'
    import { VueGrab, activate, getDefaultShortcut, formatShortcutLabel, registerPlugin } from './src/index.ts'

    const locale = navigator.language.toLowerCase().startsWith('ja') ? 'ja' : 'en'
    const text = locale === 'ja'
      ? {
          heroDesc: 'Vue アプリの要素をクリックしてコンポーネント情報を取得し、AI へ渡せます',
          tryNow: '試してみる',
          sampleComponents: 'サンプルコンポーネント',
          features: '機能',
          grabOutput: '取得結果',
          keyboardFeature: (s) => `${s} で grab モードを切り替え。オプションで変更可能。`,
          outputHint: (s) => `「Grab a Component」を押すか ${s} を押して、要素をクリックしてください...`,
          grabbedLog: '取得できました',
          copyAsJson: 'JSONでコピー',
          countComponents: 'コンポーネント数',
          componentCount: (n) => `コンポーネント数: ${n}`,
          grabButton: 'コンポーネントを取得',
          builtWith: 'Built with',
        }
      : {
          heroDesc: 'Click any element in your Vue app → get component info → ask AI to change it',
          tryNow: 'Try It Now',
          sampleComponents: 'Sample Components',
          features: 'Features',
          grabOutput: 'Grab Output',
          keyboardFeature: (s) => `Toggle grab mode with ${s}. Customizable via plugin options.`,
          outputHint: (s) => `Click "Grab a Component" or press ${s}, then click any element...`,
          grabbedLog: 'Grabbed!',
          copyAsJson: 'Copy as JSON',
          countComponents: 'Count Components',
          componentCount: (n) => `Component count: ${n}`,
          grabButton: 'Grab a Component',
          builtWith: 'Built with',
        }

    // ── Child Components ──

    const Avatar = defineComponent({
      name: 'Avatar',
      props: { initials: String },
      setup(props) {
        return () => h('div', { class: 'avatar' }, props.initials)
      },
    })

    const UserProfile = defineComponent({
      name: 'UserProfile',
      props: { name: String, role: String },
      setup(props) {
        return () => h('div', { class: 'user-profile' }, [
          h(Avatar, { initials: props.name?.[0] ?? '?' }),
          h('div', { class: 'user-info' }, [
            h('h3', props.name),
            h('p', props.role),
          ]),
        ])
      },
    })

    const StatCard = defineComponent({
      name: 'StatCard',
      props: { number: String, label: String },
      setup(props) {
        return () => h('div', { class: 'stat-card' }, [
          h('div', { class: 'number' }, props.number),
          h('div', { class: 'label' }, props.label),
        ])
      },
    })

    const FeatureCard = defineComponent({
      name: 'FeatureCard',
      props: { title: String, description: String },
      setup(props) {
        return () => h('div', { class: 'card' }, [
          h('h3', props.title),
          h('p', props.description),
        ])
      },
    })

    const ActionBar = defineComponent({
      name: 'ActionBar',
      emits: ['grab'],
      setup(_, { emit }) {
        return () => h('div', { class: 'action-bar' }, [
          h('button', { class: 'primary', onClick: () => emit('grab') }, text.grabButton),
          h('button', null, 'Settings'),
          h('button', null, 'Export'),
          h('button', null, 'Share'),
        ])
      },
    })

    // ── Main App ──

    const App = defineComponent({
      name: 'App',
      setup() {
        const defaultShortcut = getDefaultShortcut()
        const shortcutLabel = formatShortcutLabel(defaultShortcut)
        const outputText = ref(text.outputHint(shortcutLabel))

        const handleGrab = () => {
          activate({
            editPrompt: true,
            onGrab(result) {
              outputText.value = result.prompt
            },
          })
        }

        return () => h('div', null, [
          // Hero
          h('div', { class: 'hero' }, [
            h('h1', [
              h('span', 'vue'),
              '-grab',
            ]),
            h('p', text.heroDesc),
            h('div', { class: 'shortcut-badge' }, shortcutLabel),
            h('br'),
            h('button', { class: 'grab-btn', onClick: handleGrab }, text.tryNow),
          ]),

          // Content
          h('div', { class: 'content' }, [
            // User profile
            h('h2', { class: 'section-title' }, text.sampleComponents),
            h(UserProfile, { name: 'Vue Developer', role: 'Frontend Engineer @ vue-grab' }),

            // Stats
            h('div', { class: 'stats-row' }, [
              h(StatCard, { number: '42', label: 'Components' }),
              h(StatCard, { number: '∞', label: 'Possibilities' }),
              h(StatCard, { number: '0', label: 'Config Needed' }),
            ]),

            // Action bar
            h(ActionBar, { onGrab: handleGrab }),

            // Feature cards
            h('h2', { class: 'section-title' }, text.features),
            h('div', { class: 'card-grid' }, [
              h(FeatureCard, {
                title: 'Component Detection',
                description: 'Automatically detects Vue 3 components from DOM elements using __vueParentComponent.',
              }),
              h(FeatureCard, {
                title: 'Tree Walking',
                description: 'Walks up the component tree to show the full hierarchy from clicked element to root.',
              }),
              h(FeatureCard, {
                title: 'File Path Resolution',
                description: 'Extracts file paths and line numbers from Vite-injected __file properties.',
              }),
              h(FeatureCard, {
                title: 'AI-Ready Prompts',
                description: 'Generates formatted prompts with component info, ready to paste into Claude or any AI.',
              }),
              h(FeatureCard, {
                title: 'Keyboard Shortcut',
                description: text.keyboardFeature(shortcutLabel),
              }),
              h(FeatureCard, {
                title: 'Zero Config',
                description: 'Just app.use(VueGrab) and you\'re ready to go. No build config needed.',
              }),
            ]),

            // Output
            h('div', { class: 'output-section' }, [
              h('h3', text.grabOutput),
              h('pre', outputText.value),
            ]),
          ]),

          // Footer
          h('div', { class: 'footer' }, [
            `${text.builtWith} `,
            h('a', { href: '#' }, 'Vue 3'),
            ' + ',
            h('a', { href: '#' }, 'vue-grab'),
          ]),
        ])
      },
    })

    const app = createApp(App)
    registerPlugin({
      name: 'demo-copy-json',
      actions: [
        {
          id: 'copy-json',
          label: text.copyAsJson,
          placement: 'context-menu',
          run: async ({ element, components }) => {
            if (!element) return
            const payload = JSON.stringify({
              element: element.tagName.toLowerCase(),
              classes: element.className,
              components,
            }, null, 2)
            await navigator.clipboard.writeText(payload)
          },
        },
        {
          id: 'count-components',
          label: text.countComponents,
          placement: 'toolbar',
          run: ({ components }) => {
            alert(text.componentCount(components.length))
          },
        },
      ],
    })
    app.use(VueGrab, {
      editPrompt: true,
      locale,
      onGrab(result) {
        console.log(text.grabbedLog, result)
      },
    })
    app.mount('#app')
  </script>
</body>
</html>
